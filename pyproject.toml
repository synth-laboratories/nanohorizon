[project]
name = "nanohorizon"
version = "0.1.0"
description = "Crafter ML engineering golf scaffolding"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "httpx>=0.28.1",
  "pyyaml>=6.0.2",
]

[dependency-groups]
dev = [
  "pytest>=8.4.2",
]
training = [
  "accelerate>=1.10.0",
  "datasets>=4.1.0",
  "peft>=0.17.0",
  "torch>=2.7.0",
  "transformers>=4.57.0",
  "trl>=0.21.0",
  "vllm>=0.10.0",
]

[tool.uv]
package = false
