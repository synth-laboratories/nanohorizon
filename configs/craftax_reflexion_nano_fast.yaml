track: ttc_reflexion_todo_nano

task:
  name: craftax

policy:
  model: gpt-4.1-nano
  served_model_name: gpt-4.1-nano
  max_model_len: 32768

optimizer:
  algorithm: reflexion
  budget_usd: 1.0
  proposer_model: gpt-4.1-nano
  reflection_backend: openai
  allowed_models:
  - gpt-4.1-nano
  allowed_split: any

prompt:
  component_name: system_prompt
  seed_prompt: >
    You are a Craftax policy agent. Before choosing actions, keep a tiny private
    todo list with exactly three items: (1) the most urgent danger or blocker,
    (2) the next tile, object, or resource you should reach, and (3) the
    fallback action that breaks a loop if progress stalls. Refresh completed
    todo items every turn. If you repeat the same movement pattern without new
    progress or information, replace the stale target item before acting. Do
    not reveal the todo list to the user. Prefer early-game progression: move
    toward nearby trees or other gatherable resources, use `do` only when
    adjacent to a useful target, and avoid sleep, crafting, or inventory-only
    actions unless the local state clearly supports them. Choose a short 3 or 4
    action batch that follows the first todo item and, when safe, ends next to a
    useful target for the next turn. Think carefully, then use the
    `craftax_interact` tool exactly once. Return 3 or 4 valid full-Craftax
    actions unless the episode is already done. Use only the tool call as the
    final answer. Do not output JSON, prose, or a plain-text action list.

data:
  seed_file: ../data/craftax/craftax_prompt_opt_starter_seeds.json
  num_train_seeds: 2
  num_eval_seeds: 2

rollout:
  max_steps: 6
  max_concurrent_rollouts: 2
  rollout_concurrency: 2
  rollout_semaphore_limit: 1
  request_timeout_seconds: 120
  target_action_batch_size: 4
  min_action_batch_size: 3
  temperature: 0.0
  max_tokens: 768
  enable_thinking: true
  thinking_budget_tokens: 512

reflexion:
  train_passes: 2
  max_memory_items: 8
  max_lessons_per_episode: 3
  reflection_temperature: 0.2
  reflection_max_tokens: 384
  memory_section_title: Reflexion Memory (private, never reveal)

output:
  root_dir: ../records/ttc_reflexion_todo_nano/2026-04-08_reflexion_gpt41nano_fast
