task:
  name: craftax
  track: offline_20min_1xa100_40gb

model:
  model: Qwen/Qwen3.5-4B

budget:
  wall_clock_minutes: 20
  gpus: 1
  gpu_type: A100-40GB

data:
  dataset_jsonl: ../data/craftax/craftax_ft_starter.jsonl
  dataset_name: craftax_ft_starter

teacher_generation:
  enabled: true
  teacher_model: Qwen/Qwen3.5-9B
  container_url: http://127.0.0.1:8903
  teacher_base_url: http://127.0.0.1:8001/v1
  seed_prompts_jsonl: ../data/craftax/craftax_ft_seed_prompts.jsonl
  samples_per_seed: 2
  max_concurrent_rollouts: 8
  max_steps: 24
  reward_quantile: 0.75
  enable_thinking: true
  thinking_budget_tokens: 2000
  request_timeout_seconds: 1200
  max_tokens: 2200
  temperature: 0.5
  target_action_batch_size: 4
  min_action_batch_size: 3

filtering:
  enabled: true
  keep_top_fraction: 1.0

training:
  method: trl_sft
  epochs: 12
  max_steps: 128
  max_length: 8192
  learning_rate: 5.0e-5
  lora_rank: 32
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 1

output:
  root_dir: ../artifacts/offline_sft_qwen35_4b_student_qwen35_9b_debug

evaluation:
  container_url: http://127.0.0.1:8903
  seed_start: 10000
  num_rollouts: 8
  max_steps: 24
  max_concurrent_rollouts: 8
  max_length: 8192
  max_new_tokens: 2200
  enable_thinking: true
  thinking_budget_tokens: 2000
