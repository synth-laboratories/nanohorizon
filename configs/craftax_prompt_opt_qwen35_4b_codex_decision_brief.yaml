task:
  name: craftax

policy:
  model: Qwen/Qwen3.5-4B
  served_model_name: qwen35-4b-prompt-opt
  max_model_len: 8192

optimizer:
  budget_usd: 1.0
  proposer_model: gpt-5.4-mini
  reflection_backend: policy_inference
  allowed_models:
  - gpt-5.4
  - gpt-5.4-mini
  - gpt-5.4-nano
  allowed_split: any

search:
  objective: improve_craftax_rollout_reward
  max_metric_calls: 8
  reflection_minibatch_size: 2
  candidate_selection_strategy: epsilon_greedy
  seed: 11

prompt:
  component_name: system_prompt
  seed_prompt: >
    You are a Craftax policy agent. Read the compact decision brief and the
    recent reward-history window before choosing actions. Use the decision
    brief to decide whether this turn is stabilize, gather, craft, or explore.
    If loop risk is high, change movement pattern immediately instead of
    repeating the same batch. Prefer the brief's priority targets, and use
    `do` only when adjacent to a useful target. Prefer early-game resource
    gathering, then convert gathered materials into progress-making crafts only
    when the brief says the materials are already available. Think carefully,
    then use the `craftax_interact` tool exactly once. Return exactly 1 valid
    full-Craftax action unless the episode is already done. Use only the tool
    call as the final answer. Do not output JSON, prose, or a plain-text
    action list.

data:
  seed_file: ../data/craftax/craftax_prompt_opt_eval20_seeds.json
  num_train_seeds: 6
  num_eval_seeds: 20

rollout:
  max_steps: 8
  max_concurrent_rollouts: 4
  rollout_concurrency: 4
  rollout_semaphore_limit: 2
  request_timeout_seconds: 900
  target_action_batch_size: 1
  min_action_batch_size: 1
  temperature: 0.0
  max_tokens: 3072
  enable_thinking: true
  thinking_budget_tokens: 2000

output:
  root_dir: ../records/prompt_opt_1usd_gpt54_family/2026-04-12_codex_decision_brief
