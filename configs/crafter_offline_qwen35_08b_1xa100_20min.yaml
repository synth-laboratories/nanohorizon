task:
  name: crafter
  track: offline_20min_1xa100_40gb

model:
  model: Qwen/Qwen3.5-0.8B

budget:
  wall_clock_minutes: 20
  gpus: 1
  gpu_type: A100-40GB

data:
  dataset_jsonl: ../data/crafter/crafter_ft_starter.jsonl
  dataset_name: crafter_ft_starter

teacher_generation:
  enabled: true
  teacher_model: Qwen/Qwen3.5-4B
  teacher_base_url: http://127.0.0.1:8001/v1
  seed_prompts_jsonl: ../data/crafter/crafter_ft_seed_prompts.jsonl
  max_tokens: 64
  temperature: 0.1

filtering:
  enabled: true
  keep_top_fraction: 0.5

training:
  method: trl_sft
  epochs: 1
  max_steps: 6
  max_length: 512
  learning_rate: 1.0e-5
  lora_rank: 16
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 1

output:
  root_dir: ../artifacts/offline_sft_baseline

evaluation:
  eval_prompts_jsonl: ../data/crafter/crafter_eval_prompts.jsonl
  max_new_tokens: 32
