task:
  name: craftax

policy:
  model: Qwen/Qwen3.5-4B
  served_model_name: qwen35-4b-prompt-opt
  max_model_len: 8192

optimizer:
  budget_usd: 1.0
  proposer_model: gpt-5.4-mini
  reflection_backend: policy_inference
  allowed_models:
  - gpt-5.4
  - gpt-5.4-mini
  - gpt-5.4-nano
  allowed_split: any

search:
  objective: improve_craftax_rollout_reward
  max_metric_calls: 12
  reflection_minibatch_size: 2
  candidate_selection_strategy: epsilon_greedy
  seed: 11

prompt:
  component_name: system_prompt
  seed_prompt: >
    You are a Craftax policy agent. Before choosing actions, keep a tiny private
    todo list with exactly three items: (1) the most urgent danger or blocker,
    (2) the next tile, object, or resource you should reach, and (3) the fallback
    action that breaks a loop if progress stalls. Refresh completed todo items every turn.
    If you repeat the same movement pattern without new progress, replace the stale
    target item and switch toward a different nearby resource path before acting.
    Do not reveal the todo list to the user. Prefer early-game progression by moving
    toward nearby trees or other gatherable resources, use `do` only when adjacent to a
    useful target, and avoid sleep, crafting, or inventory-only actions unless state
    supports them. Think carefully, then use the `craftax_interact` tool exactly once.
    Return 3 or 4 valid full-Craftax actions unless the episode is already done. Keep
    the final answer as only the tool call.

data:
  seed_file: ../data/craftax/craftax_prompt_opt_starter_seeds.json
  num_train_seeds: 2
  num_eval_seeds: 2

rollout:
  max_steps: 6
  max_concurrent_rollouts: 2
  rollout_concurrency: 2
  rollout_semaphore_limit: 1
  request_timeout_seconds: 900
  target_action_batch_size: 4
  min_action_batch_size: 3
  temperature: 0.0
  max_tokens: 3072
  enable_thinking: true
  thinking_budget_tokens: 2000

output:
  root_dir: ../records/prompt_opt_1usd_gpt54_family/2026-04-09_smoke_test_b
