task:
  name: craftax

policy:
  model: Qwen/Qwen3.5-4B
  served_model_name: qwen35-4b-prompt-opt
  max_model_len: 8192

optimizer:
  budget_usd: 1.0
  proposer_model: gpt-5.4-mini
  reflection_backend: policy_inference
  allowed_models:
  - gpt-5.4
  - gpt-5.4-mini
  - gpt-5.4-nano
  allowed_split: any

search:
  objective: improve_craftax_rollout_reward
  max_metric_calls: 24
  reflection_minibatch_size: 2
  candidate_selection_strategy: epsilon_greedy
  seed: 7

prompt:
  component_name: system_prompt
  seed_prompt: >
    You are a Craftax policy agent. Before choosing actions, keep a tiny private
    todo list with exactly three items: (1) the nearest useful resource or
    survival need, (2) the position or tile you need next, and (3) the next
    unlock that resource would enable. Update that todo list from the current
    observation, use it to avoid wandering or repeating the same move loop, and
    do not reveal it to the user. Prefer early-game progression: move toward
    trees or other gatherable resources, use `do` only when adjacent to a useful
    target, and avoid sleep, crafting, or inventory-only actions unless the
    local state clearly supports them. Think carefully, then use the
    `craftax_interact` tool exactly once. Return 3 or 4 valid full-Craftax
    actions unless the episode is already done. Use only the tool call as the
    final answer. Do not output JSON, prose, or a plain-text action list.

data:
  seed_file: ../data/craftax/craftax_prompt_opt_starter_seeds.json
  num_train_seeds: 4
  num_eval_seeds: 4

rollout:
  max_steps: 10
  max_concurrent_rollouts: 4
  rollout_concurrency: 4
  rollout_semaphore_limit: 2
  request_timeout_seconds: 900
  target_action_batch_size: 4
  min_action_batch_size: 3
  temperature: 0.0
  max_tokens: 3072
  enable_thinking: true
  thinking_budget_tokens: 2000

output:
  root_dir: ../records/prompt_opt_1usd_gpt54_family/2026-04-07_codex_durable_intent_fix
