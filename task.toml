[task]
id = "nanohorizon_unique_achievement_gepa_oe"
title = "NanoHorizon Unique-Achievement GEPA"
kind = "smr_reportbench"
version = "0.1"
score_command = "python3 workspace/score.py score --output-root {output_root}"
report_path = "eval_report.md"

[smr]
execution_mode = "host_local_runner"
pool_strategy = "local_workspace_only"
work_mode = "open_ended_discovery"

[smr.key_policy]
mode = "synth_only"

[smr.runtime]
runtime_kind = "sandbox_agent"
environment_kind = "harbor"

[smr.project]
name = "NanoHorizon Unique Achievement GEPA {nick}-{timestamp}"
timezone = "UTC"
notes = """
NANOHORIZON UNIQUE-ACHIEVEMENT GEPA — first-step open-ended GEPA research.

Read the staged README, task.toml, verifier rubric, and staged references before
starting. You are working inside a cloned `nanohorizon` repo checkout for this
task, and the whole repo is available in the writable workspace.

This is a task-planning lane. You MUST use `plan_tasks` to create tasks.
Your first non-read action MUST be a `plan_tasks` tool call.
Do not respond with a prose-only plan. If you describe the task plan without
calling `plan_tasks`, the run will fail.

Goal:
- establish the baseline held-out unique-achievement result
- run one local GEPA optimization pass targeting unique achievements
- judge lift, scientific quality, and throughput under a 500-rollout budget

Baseline validity rule:
- The only valid baseline track for this lane is `prompt_opt_local_gemini25_flash_lite`.
- Baseline grounding must come from a fresh local run of:
  - `scripts/run_craftax_prompt_opt_gemini25_flash_lite_local.sh`
  - `configs/craftax_prompt_opt_gemini25_flash_lite_local_eval20.yaml`
- The worker should use `gemini-2.5-flash-lite` as the policy model through an
  OpenAI-compatible endpoint, not a Modal-hosted inference server.
- If both `GEMINI_API_KEY` and `OPENAI_API_KEY` are present, prefer
  `GEMINI_API_KEY` for the policy experiment path.
- Use
  `OPENAI_BASE_URL=https://generativelanguage.googleapis.com/v1beta/openai`
  for the policy experiment path unless a different OpenAI-compatible Gemini
  base URL is already provided.
- Do not use `offline_*`, `rlvr_*`, or any non-prompt-opt record as the
  baseline for this lane, even if it contains achievement frequencies.
- Do not use the staged Qwen prompt-opt reference bundle as the baseline for
  this lane; it is from the wrong policy family.
- If fresh local Gemini baseline evidence is unavailable, fail the task rather
  than substituting another baseline source.

Workspace validity rule:
- Use the current checkout as the writable workspace root.
- Use the literal `{dataset_ref}` path as the staged packet root.
- Do not prepend `/workspace/` to `{dataset_ref}` unless the current checkout
  actually resolves that path.
- Do not manually `git clone` a replacement repo to recover from an apparent
  missing workspace.
- Do not read or borrow artifacts from another run under `/synth/state/.out/...`
  to satisfy this lane.
- If the prompt-opt checkout or staged packet is unavailable after inspecting
  the current checkout root truthfully, fail honestly instead of attempting a
  salvage path.

Plan exactly one worker-host repo task for the main execution. Do not create a
separate reviewer task before the main run.
Do not stop after describing the task graph in natural language. You must
materialize the task graph with `plan_tasks`.

Execution-routing requirement for every planned repo task:
- Every task you create with `plan_tasks` MUST include
  `task_dispatch={{"execution_owner":"worker_host","worker_pool":"default","target_kind":"repo","task_affinity_key":"nanohorizon-unique-achievement-gepa"}}`
- The only valid execution owner is exactly `"worker_host"`.

Git routing:
- Use the `workspace_push` tool (not raw git commands).
- After push succeeds, call `set_task_state` with state `done`.
"""

[smr.research]
scenario = "reportbench-{task_id}-unique-achievement-gepa"
repo_url = "https://github.com/synth-laboratories/nanohorizon.git"

[[smr.research.tasks]]
task_key = "run_unique_achievement_gepa"
kind = "repo_task"
instructions = """
Run a unique-achievement-focused GEPA study for NanoHorizon Craftax and produce
a scored report.

IMPORTANT:
- Your first action after reading the staged packet must be a `plan_tasks` call.
- Do not summarize the plan in plain text instead of calling `plan_tasks`.
- A prose-only plan does not count as task planning for this lane.

Before you start, read:
- `{dataset_ref}/README.md`
- `{dataset_ref}/task.toml`
- `{dataset_ref}/VERIFIER_RUBRIC.md`
- the `reference/nanohorizon/...` files in `{dataset_ref}`

Workspace discipline:
- Use the literal `{dataset_ref}` path exactly as provided by the task contract.
- Do not assume the packet is mounted under `/workspace/...` unless you have
  verified that from the current checkout.
- Do not `git clone` a replacement repo to work around a missing packet.
- Do not read or copy prior-run artifacts from `/synth/state/.out/...`.
- If the packet appears missing, inspect the current checkout root first and
  only then fail honestly. Do not fabricate or salvage a result bundle.

Treat the NanoHorizon prompt-opt track as the canonical GEPA baseline:
- `reference/nanohorizon/src/nanohorizon/baselines/prompt_opt.py`
- `reference/nanohorizon/scripts/run_craftax_prompt_opt_gemini25_flash_lite_local.sh`
- `reference/nanohorizon/configs/craftax_prompt_opt_gemini25_flash_lite_local_eval20.yaml`
- `reference/nanohorizon/docs/tracks/prompt_opt_1usd_gpt54_family.md`

You are working inside a cloned `nanohorizon` repo checkout, so the full repo
is available in the writable workspace in addition to the staged packet.

Goal:
- determine the baseline held-out unique-achievement outcome
- use local GEPA with a 500-rollout training budget to maximize unique achievements
- compare baseline vs optimized results on the same held-out set

Hard baseline requirement:
- The only valid baseline track is `prompt_opt_local_gemini25_flash_lite`.
- Valid baseline evidence must come from a fresh local run using:
  - `scripts/run_craftax_prompt_opt_gemini25_flash_lite_local.sh`
  - `configs/craftax_prompt_opt_gemini25_flash_lite_local_eval20.yaml`
- `offline_*`, `rlvr_*`, checked-in reference bundles, and any non-prompt-opt records are invalid baseline
  sources for this lane.
- Use `gemini-2.5-flash-lite` as the policy `request_model`.
- If both `GEMINI_API_KEY` and `OPENAI_API_KEY` are present, the policy run
  must use `GEMINI_API_KEY`, not the generic OpenAI key.
- Run the trainer locally via `python -m nanohorizon.baselines.prompt_opt` through
  the local launcher script, not `modal run`.
- If the local Gemini baseline cannot be grounded, stop and fail honestly instead
  of substituting another baseline.

No salvage rule:
- Do not borrow prior-run surrogate bundles, copied result directories, or
  manually probed candidates from other runs to satisfy this task.
- Do not assemble a passing bundle from old artifacts if the fresh run did not
  execute.
- Do not cite or copy artifacts from another run id under `/synth/state/.out/...`.
- Do not use the checked-in Qwen prompt-opt reference record as a substitute
  for the required fresh local Gemini run.

Required final artifacts:
- `artifacts/unique_achievement_baseline.json`
- `artifacts/unique_achievement_gepa_result.json`
- `artifacts/unique_achievement_summary.json`
- `artifacts/reportbench_output.json`
- `eval_report.md`

Required report content:
- baseline track id used, which must be `prompt_opt_local_gemini25_flash_lite`
- baseline source kind, which must indicate a fresh local Gemini run
- baseline script/config path used
- baseline record path used
- held-out measurement set used
- baseline unique-achievement score
- optimized unique-achievement score
- unique-achievement uplift
- supporting baseline and optimized achievement-frequency summaries
- training rollouts used, capped at 500
- if training rollouts used is materially below budget, a concrete termination
  reason explaining why the run stopped early
- elapsed wall-clock time and throughput discussion
- short notes on what GEPA tried and whether the final change looks like a real
  algorithmic improvement

Use `workspace_push` with a commit message summarizing the baseline score, best
score, and uplift, then call `set_task_state` with state `done`.
"""
acceptance_criteria = [
  "artifacts/unique_achievement_baseline.json exists with grounded fresh local Gemini prompt-opt baseline held-out measurements",
  "artifacts/unique_achievement_gepa_result.json exists with optimization output",
  "artifacts/unique_achievement_summary.json exists with baseline, optimized, uplift, runtime, and rollout budget accounting",
  "The baseline artifact declares baseline_track_id = prompt_opt_local_gemini25_flash_lite and uses the local Gemini script/config paths",
  "The GEPA run used no more than 500 training rollouts and either used at least 100 training rollouts or reports a concrete termination reason for stopping early",
  "eval_report.md explains lift, scientific quality, and throughput for the unique-achievement objective",
  "All required artifacts are committed and pushed",
]

[smr.pools]
worker_pool_id = "default"
require_pool_target = true
allow_container_url_fallback = false
allow_local_bootstrap = true

