[smr.roles.orchestrator]
profile_id = "codex_gpt_5_4_mini_medium"
agent_kind = "codex"
model = "gpt-5.4-mini"
model_params = { reasoning_effort = "medium" }
purpose = "Plan the Go-Explore optimization task and coordinate execution"

[smr.roles.worker]
profile_id = "codex_gpt_5_4_mini_medium"
agent_kind = "codex"
model = "gpt-5.4-mini"
model_params = { reasoning_effort = "medium" }
purpose = "Execute Go-Explore prompt search, evaluate results, write report"

[smr.roles.verifier]
provider = "openai"
model = "gpt-5.4-nano"
temperature = 0.0
seed = 0
api_key_env = "OPENAI_API_KEY"

[smr.metered_infra.inference]
enabled = true
provider = "google"
model = "gemini-2.5-flash-lite"
actor_id = "worker"

[limits]
time_budget_seconds = 2700
cost_budget_usd = 5.0
monthly_cost_budget_usd = 15.0

[smr.submission]
scoring_mode = "score_command"

[[smr.submission.artifacts]]
artifact_type = "eval_report"
path = "eval_report.md"
required = true

[[smr.submission.artifacts]]
artifact_type = "go_explore_result"
path = "artifacts/go_explore_result.json"
required = true

[[smr.submission.artifacts]]
artifact_type = "experiment_summary"
path = "artifacts/experiment_summary.json"
required = true

[[smr.submission.artifacts]]
artifact_type = "reportbench_output"
path = "artifacts/reportbench_output.json"
required = true

[[smr.submission.artifacts]]
artifact_type = "verifier_review"
path = "artifacts/verifier_review.json"
required = false

[reward]
mode = "verifier_score"
primary_metric = "rubric_reward"
source_artifact = "artifacts/verifier_review.json"
source_json_path = "score"
rollout_source_artifact = "artifacts/reportbench_output.json"

[verifier]
enabled = true
rubric_path = "VERIFIER_RUBRIC.md"
report_path = "eval_report.md"
artifact_paths = [
  "artifacts/go_explore_result.json",
  "artifacts/experiment_summary.json",
  "artifacts/reportbench_output.json",
  "workspace/run_go_explore.py",
]
output_path = "artifacts/verifier_review.json"

