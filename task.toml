[smr.roles.orchestrator]
profile_id = "codex_gpt_5_4_mini_medium"
agent_kind = "codex"
model = "gpt-5.4-mini"
model_params = { reasoning_effort = "medium" }
purpose = "Plan and review the unique-achievement GEPA study"

[smr.roles.worker]
profile_id = "codex_gpt_5_4_mini_medium"
agent_kind = "codex"
model = "gpt-5.4-mini"
model_params = { reasoning_effort = "medium" }
purpose = "Execute the unique-achievement GEPA study"

[smr.roles.verifier]
provider = "openai"
model = "gpt-5.4-nano"
temperature = 0.0
seed = 0
api_key_env = "OPENAI_API_KEY"

[limits]
time_budget_seconds = 5400
cost_budget_usd = 10.0
monthly_cost_budget_usd = 30.0

[smr.submission]
scoring_mode = "score_command"

[[smr.submission.artifacts]]
artifact_type = "eval_report"
path = "eval_report.md"
required = true

[[smr.submission.artifacts]]
artifact_type = "unique_achievement_baseline"
path = "artifacts/unique_achievement_baseline.json"
required = true

[[smr.submission.artifacts]]
artifact_type = "unique_achievement_gepa_result"
path = "artifacts/unique_achievement_gepa_result.json"
required = true

[[smr.submission.artifacts]]
artifact_type = "unique_achievement_summary"
path = "artifacts/unique_achievement_summary.json"
required = true

[[smr.submission.artifacts]]
artifact_type = "reportbench_output"
path = "artifacts/reportbench_output.json"
required = true

[[smr.submission.artifacts]]
artifact_type = "verifier_review"
path = "artifacts/verifier_review.json"
required = false

[reward]
mode = "verifier_score"
primary_metric = "rubric_reward"
source_artifact = "artifacts/verifier_review.json"
source_json_path = "score"
rollout_source_artifact = "artifacts/reportbench_output.json"

[verifier]
enabled = true
rubric_path = "VERIFIER_RUBRIC.md"
report_path = "eval_report.md"
artifact_paths = [
  "artifacts/unique_achievement_baseline.json",
  "artifacts/unique_achievement_gepa_result.json",
  "artifacts/unique_achievement_summary.json",
  "artifacts/reportbench_output.json",
]
output_path = "artifacts/verifier_review.json"

[output]
canonical_json_path = "artifacts/reportbench_output.json"

[reportbench.metadata]
schema_version = 1
task_type = "optimization"
call_budget = "medium"
mode = "openended"
difficulty = "medium"
duration = "45_mins"

quality = "high"
maturity = "medium"
[reportbench.metadata.method]
family = "online"
name = "gepa"

[reportbench.metadata.optimized_model]
size = "small"
modality = "text_only"
