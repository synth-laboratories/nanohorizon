name: Python checks

on:
  push:
    branches: [main]
    paths:
      - "pyproject.toml"
      - "uv.lock"
      - "src/**"
      - ".github/workflows/python-checks.yml"
  pull_request:
    branches: [main]
    paths:
      - "pyproject.toml"
      - "uv.lock"
      - "src/**"
      - ".github/workflows/python-checks.yml"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.8.15"

      - name: Sync dev environment
        run: uv sync --group dev --frozen

      - name: Ruff check
        run: uv run ruff check src

      - name: Ruff format
        run: uv run ruff format --check src

      - name: ty
        run: uv run ty check
