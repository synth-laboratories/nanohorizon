name: Build Track Images

on:
  workflow_dispatch:
    inputs:
      push_latest:
        description: "Also push :latest tags"
        required: false
        default: "true"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-track-images.yml"
      - "docker/**"
      - "scripts/build_track_image.sh"

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: synth-laboratories

jobs:
  base:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      base_sha_tag: ${{ steps.meta.outputs.sha_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free runner disk
        shell: bash
        run: |
          set -euxo pipefail
          docker system prune -af || true
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /opt/hostedtoolcache
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        shell: bash
        run: |
          SHA_TAG="sha-${GITHUB_SHA::12}"
          echo "sha_tag=$SHA_TAG" >> "$GITHUB_OUTPUT"
          {
            echo "tags<<EOF"
            echo "${REGISTRY}/${IMAGE_NAMESPACE}/nanohorizon-base:${SHA_TAG}"
            if [[ "${GITHUB_REF_NAME}" == "main" && "${{ github.event.inputs.push_latest || 'true' }}" == "true" ]]; then
              echo "${REGISTRY}/${IMAGE_NAMESPACE}/nanohorizon-base:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push base image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/base.Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          tags: ${{ steps.meta.outputs.tags }}

  tracks:
    runs-on: ubuntu-latest
    needs: base
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: nanohorizon-offline
            dockerfile: docker/offline.Dockerfile
          - image_name: nanohorizon-rlvr
            dockerfile: docker/rlvr.Dockerfile
          - image_name: nanohorizon-prompt-opt
            dockerfile: docker/prompt_opt.Dockerfile
          - image_name: nanohorizon-eval
            dockerfile: docker/eval.Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free runner disk
        shell: bash
        run: |
          set -euxo pipefail
          docker system prune -af || true
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /opt/hostedtoolcache
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        shell: bash
        run: |
          SHA_TAG="sha-${GITHUB_SHA::12}"
          {
            echo "tags<<EOF"
            echo "${REGISTRY}/${IMAGE_NAMESPACE}/${{ matrix.image_name }}:${SHA_TAG}"
            if [[ "${GITHUB_REF_NAME}" == "main" && "${{ github.event.inputs.push_latest || 'true' }}" == "true" ]]; then
              echo "${REGISTRY}/${IMAGE_NAMESPACE}/${{ matrix.image_name }}:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push track image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/nanohorizon-base:${{ needs.base.outputs.base_sha_tag }}
          tags: ${{ steps.meta.outputs.tags }}
