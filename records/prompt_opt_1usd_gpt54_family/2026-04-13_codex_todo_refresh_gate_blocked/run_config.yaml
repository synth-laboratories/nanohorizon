track: prompt_opt_1usd_gpt54_family
task: craftax
base_model: Qwen/Qwen3.5-4B
optimizer_budget_usd: 1.0
optimizer_models:
  - gpt-5.4
  - gpt-5.4-mini
  - gpt-5.4-nano
rollout:
  max_steps: 10
  max_concurrent_rollouts: 4
  rollout_concurrency: 4
  rollout_semaphore_limit: 2
  request_timeout_seconds: 900
  target_action_batch_size: 4
  min_action_batch_size: 3
  temperature: 0.0
  max_tokens: 3072
  enable_thinking: true
  thinking_budget_tokens: 2000
train_seeds:
  - 10007
  - 10008
  - 10011
  - 10014
eval_seeds:
  - 10001
  - 10010
  - 10017
  - 10019
prompt:
  component_name: system_prompt
  seed_prompt: >
    You are a Craftax policy agent. Before choosing actions, keep a tiny private
    todo list with exactly three items: (1) the most urgent survival blocker,
    (2) the nearest useful resource, object, or tile, and (3) the fallback
    action that breaks a loop if progress stalls. Refresh completed todo items
    every turn. If the same move pattern repeats without progress or new
    information, replace item 2 before acting. Do not reveal the todo list to
    the user. When a useful target is adjacent, spend the first action on `do`;
    otherwise move toward nearby trees or other gatherable resources. Avoid
    sleep, crafting, or inventory-only actions unless the local state clearly
    justifies them. Choose a short 3 or 4 action batch that either collects the
    target or ends next to it for the next turn. Think carefully, then use the
    `craftax_interact` tool exactly once. Return 3 or 4 valid full-Craftax
    actions unless the episode is already done. Use only the tool call as the
    final answer. Do not output JSON, prose, or a plain-text action list.
